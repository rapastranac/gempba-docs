site_name: GemPBA
site_url: https://rapastranac.github.io/gempba-docs/
repo_url: https://github.com/rapastranac/gempba
repo_name: rapastranac/gempba
copyright: Copyright &copy; 2021&ndash;2026 <a href="https://andrespastrana.com/" target="_blank" rel="noopener">Andres Pastrana</a>

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  palette:
    primary: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - attr_list
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Why GemPBA: why-gempba.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Requirements: getting-started/requirements.md
      - Installation: getting-started/installation.md
      - Building: getting-started/building.md
      - Quick Start: quick-start.md
  - Reference:
      - Architecture: architecture.md
      - API Reference:
          - Overview: reference/index.md
          - Class Index: reference/class-index.md
          - File Index: reference/file-index.md
          - Defaults:
            - gempba: reference/defaults/gempba-hpp.md
            - node_manager: reference/defaults/node-manager.md
            - node: reference/defaults/node.md
          - Interfaces:
              - Overview: reference/interfaces/interfaces.md
              - node_core: reference/interfaces/node-core.md
              - node_traits: reference/interfaces/node-traits.md
              - load_balancer: reference/interfaces/load-balancer.md
              - scheduler: reference/interfaces/scheduler.md
              - serial_runnable: reference/interfaces/serial-runnable.md
              - stats: reference/interfaces/stats.md
              - stats_visitor: reference/interfaces/stats-visitor.md
          - Implementations:
              - Overview: reference/implementations/implementations.md
              - Load Balancers:
                - Quasi-Horizontal: reference/implementations/load-balancers/quasi-horizontal.md
                - Work-Stealing: reference/implementations/load-balancers/work-stealing.md
              - Schedulers:
                - MPI Semi-Centralized: reference/implementations/schedulers/semi-centralized.md
                - MPI Centralized: reference/implementations/schedulers/centralized.md
              - Stats:
                  - Default MPI: reference/implementations/stats/default-mpi-stats.md
              - Stats Visitors:
                  - Default MPI: reference/implementations/stats-visitors/default-mpi-stats-visitor.md
          - IPC Topologies:
              - Scheduler: scheduler-topologies.md
          - Utilities:
              - Utilities: reference/utilities/utilities.md
              - task_packet: reference/utilities/task-packet.md
              - task_bundle: reference/utilities/task-bundle.md
              - score: reference/utilities/score.md
              - result: reference/utilities/result.md
              - transmission_guard: reference/utilities/transmission-guard.md
              - tree: reference/utilities/tree.md
              - Queue: reference/utilities/queue.md
      - Examples: examples.md
  - Development:
      - Contributing: contributing.md
  - Releases: releases.md
  - Citing: citing.md
  - Sponsor: sponsor/index.md
